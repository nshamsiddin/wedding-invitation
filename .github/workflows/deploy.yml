# ─────────────────────────────────────────────────────────────────────────────
# Required GitHub Actions secrets (Settings → Secrets and variables → Actions):
#
#   SERVER_HOST    — IP address or hostname of the Hetzner CX22 VPS
#   SERVER_SSH_KEY — Private ed25519 key for the `deploy` user
#                    (the matching public key must be in ~deploy/.ssh/authorized_keys)
#   DOMAIN         — Public domain used for the health-check URL
#                    e.g. wedding.example.com  →  https://wedding.example.com/api/health
# ─────────────────────────────────────────────────────────────────────────────

name: CI / Deploy

on:
  push:
    branches: [main]

jobs:
  # ── Job 1: Type-check every workspace ──────────────────────────────────────
  # Runs on the GitHub-hosted runner; catches type errors before touching the
  # server.  The deploy job will not start if this job fails.
  validate:
    name: Type-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js 20 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Caches ~/.npm keyed on the root package-lock.json
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Both client and server resolve @invitation/shared via path aliases pointing
      # directly at shared/src/index.ts, so type-checking them implicitly validates
      # all shared code — no separate shared build step is needed here.

      # client/tsconfig.json already has "noEmit": true — this is type-check only.
      - name: Type-check — client
        run: npx tsc --project client/tsconfig.json

      # server/tsconfig.json emits by default; --noEmit keeps this to type-check only.
      - name: Type-check — server
        run: npx tsc --noEmit --project server/tsconfig.json

  # ── Job 2: Deploy to Hetzner VPS ───────────────────────────────────────────
  # All deploy steps run directly on the VPS over SSH.
  # The runner only needs the ssh-action; no Node.js setup is required here.
  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    needs: [validate]

    steps:
      - name: SSH — pull, build, migrate, reload, verify
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: deploy
          key: ${{ secrets.SERVER_SSH_KEY }}
          # Exit immediately on any error; treat unset variables as errors.
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/invitation

            echo "──────────────────────────────────────────"
            echo "Step 1/6 — Pull latest code"
            echo "──────────────────────────────────────────"
            git pull origin main

            echo "──────────────────────────────────────────"
            echo "Step 2/6 — Install dependencies (all workspaces)"
            echo "──────────────────────────────────────────"
            npm ci --workspaces

            echo "──────────────────────────────────────────"
            echo "Step 3/6 — Build: shared → client → server"
            echo "──────────────────────────────────────────"
            npm run build

            echo "──────────────────────────────────────────"
            echo "Step 4/6 — Run DB migrations"
            echo "──────────────────────────────────────────"
            npm run db:migrate

            echo "──────────────────────────────────────────"
            echo "Step 5/6 — Zero-downtime reload via PM2"
            echo "──────────────────────────────────────────"
            pm2 reload ecosystem.config.cjs --update-env

            echo "──────────────────────────────────────────"
            echo "Step 6/6 — Health check"
            echo "──────────────────────────────────────────"
            # Give the process a moment to finish binding the port, then probe
            # /api/health.  -sf: silent + fail on HTTP 4xx/5xx.  --retry* retries
            # up to 6 times over ~30 s to accommodate slow cold starts.
            sleep 3
            curl -sf \
              --retry 6 \
              --retry-delay 5 \
              --retry-connrefused \
              "http://localhost:3001/api/health" \
              || { echo "Health check failed — rolling back PM2"; pm2 reload ecosystem.config.cjs --update-env; exit 1; }

            echo "✓ Deployment successful"
