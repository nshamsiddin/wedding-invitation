<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" fill="none">
  <!-- Outermost dashed ring -->
  <circle cx="160" cy="160" r="155" stroke="#C49A6C" stroke-width="1" fill="none" stroke-dasharray="3 5" opacity="0.5"/>

  <!-- Ottoman geometric border ring (16-pointed star segments) -->
  <g opacity="0.7">
    <!-- Top -->
    <path d="M 160 10 L 168 26 L 160 20 L 152 26 Z" fill="#C49A6C"/>
    <!-- Top-right -->
    <path d="M 220 30 L 228 46 L 220 40 L 212 46 Z" fill="#C9707A" transform="rotate(45, 160, 160)"/>
    <!-- Right -->
    <path d="M 310 160 L 294 168 L 300 160 L 294 152 Z" fill="#C49A6C"/>
    <!-- Bottom-right -->
    <path d="M 220 290 L 228 274 L 220 280 L 212 274 Z" fill="#C9707A" transform="rotate(-45, 160, 160)"/>
    <!-- Bottom -->
    <path d="M 160 310 L 168 294 L 160 300 L 152 294 Z" fill="#C49A6C"/>
    <!-- Bottom-left -->
    <path d="M 100 290 L 108 274 L 100 280 L 92 274 Z" fill="#C9707A" transform="rotate(45, 160, 160) scale(-1,1) translate(-320,0)"/>
    <!-- Left -->
    <path d="M 10 160 L 26 168 L 20 160 L 26 152 Z" fill="#C49A6C"/>
    <!-- Top-left -->
    <path d="M 40 40 L 56 48 L 48 40 L 56 32 Z" fill="#C9707A" transform="rotate(-45, 160, 160)"/>
  </g>

  <!-- Second decorative ring -->
  <circle cx="160" cy="160" r="148" stroke="#E8B4B8" stroke-width="0.8" fill="none" opacity="0.6"/>

  <!-- Ottoman tile border pattern ring -->
  <g opacity="0.5">
    <!-- Small diamond ornaments around the ring at 45° intervals -->
    <path d="M160 18 L163 24 L160 30 L157 24 Z" fill="#C49A6C"/>
    <path d="M221 38 L227 41 L221 47 L215 41 Z" fill="#C49A6C" transform="rotate(45 160 160)"/>
    <path d="M291 160 L297 163 L291 169 L285 163 Z" fill="#C49A6C"/>
    <path d="M221 282 L227 279 L221 273 L215 279 Z" fill="#C49A6C" transform="rotate(-45 160 160)"/>
    <path d="M160 302 L163 296 L160 290 L157 296 Z" fill="#C49A6C"/>
    <path d="M99 282 L93 279 L99 273 L105 279 Z" fill="#C49A6C" transform="rotate(45 160 160)"/>
    <path d="M29 160 L23 163 L29 169 L35 163 Z" fill="#C49A6C"/>
    <path d="M99 38 L93 41 L99 47 L105 41 Z" fill="#C49A6C" transform="rotate(-45 160 160)"/>
  </g>

  <!-- Inner circle background – soft warm gradient -->
  <circle cx="160" cy="160" r="136" fill="url(#warmBg)"/>

  <!-- Subtle Ottoman tile texture inside circle -->
  <circle cx="160" cy="160" r="136" fill="url(#tilePat)" opacity="0.06"/>

  <!-- Inner border -->
  <circle cx="160" cy="160" r="136" stroke="url(#borderGrad)" stroke-width="1.5" fill="none"/>

  <!-- Decorative tulip motifs at cardinal points -->
  <g fill="#C9707A" opacity="0.35">
    <!-- Top tulip -->
    <path d="M 160 36 C 157 30 152 26 152 22 C 152 18 156 15 160 15 C 164 15 168 18 168 22 C 168 26 163 30 160 36 Z"/>
    <path d="M 155 38 C 150 34 147 30 148 26 C 148 24 150 23 152 24 C 154 28 155 32 155 38 Z"/>
    <path d="M 165 38 C 170 34 173 30 172 26 C 172 24 170 23 168 24 C 166 28 165 32 165 38 Z"/>
    <!-- Bottom tulip (inverted) -->
    <path d="M 160 284 C 157 290 152 294 152 298 C 152 302 156 305 160 305 C 164 305 168 302 168 298 C 168 294 163 290 160 284 Z"/>
    <path d="M 155 282 C 150 286 147 290 148 294 C 148 296 150 297 152 296 C 154 292 155 288 155 282 Z"/>
    <path d="M 165 282 C 170 286 173 290 172 294 C 172 296 170 297 168 296 C 166 292 165 288 165 282 Z"/>
  </g>

  <!-- Couple silhouettes -->
  <!-- Female (left) – blush tones -->
  <ellipse cx="127" cy="108" rx="20" ry="22" fill="#E8B4B8" opacity="0.5"/>
  <path d="M 94 228 Q 95 158 108 142 Q 117 130 127 128 Q 137 130 142 142 Q 148 158 147 175 L 147 228 Z"
        fill="#E8B4B8" opacity="0.45"/>
  <!-- Dress flare -->
  <path d="M 94 228 Q 100 268 127 272 Q 154 268 147 228 Z" fill="#E8B4B8" opacity="0.3"/>

  <!-- Male (right) – stone/gold tones -->
  <ellipse cx="196" cy="108" rx="20" ry="22" fill="#C49A6C" opacity="0.4"/>
  <path d="M 170 228 L 173 158 Q 182 134 196 130 Q 210 134 219 158 L 222 228 Z"
        fill="#C49A6C" opacity="0.35"/>

  <!-- Clasped hands / ribbon detail -->
  <path d="M 147 186 Q 162 178 175 186" stroke="#C9707A" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.6"/>

  <!-- Heart -->
  <path d="M 162 150 C 162 150 154 141 150 146 C 146 151 150 158 162 165 C 174 158 178 151 174 146 C 170 141 162 150 162 150 Z"
        fill="#C9707A" opacity="0.55"/>

  <!-- Floral accent petals -->
  <g fill="#C9707A" opacity="0.3">
    <ellipse cx="96" cy="195" rx="6" ry="10" transform="rotate(-30 96 195)"/>
    <ellipse cx="224" cy="195" rx="6" ry="10" transform="rotate(30 224 195)"/>
  </g>
  <g fill="#9BAF8E" opacity="0.3">
    <ellipse cx="88" cy="218" rx="5" ry="8" transform="rotate(-50 88 218)"/>
    <ellipse cx="232" cy="218" rx="5" ry="8" transform="rotate(50 232 218)"/>
  </g>

  <!-- Small sparkle details -->
  <g fill="#C49A6C" opacity="0.45">
    <circle cx="104" cy="140" r="2"/>
    <circle cx="216" cy="140" r="2"/>
    <circle cx="96" cy="100" r="1.5"/>
    <circle cx="224" cy="100" r="1.5"/>
  </g>

  <!-- Placeholder text -->
  <text x="160" y="248" text-anchor="middle" font-family="Playfair Display, serif" font-size="10"
        fill="#8C7B6E" opacity="0.6" letter-spacing="3">YOUR PHOTO</text>
  <text x="160" y="264" text-anchor="middle" font-family="Lato, sans-serif" font-size="8"
        fill="#A0938A" opacity="0.45" letter-spacing="2">HERE</text>

  <defs>
    <radialGradient id="warmBg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FDF8F0"/>
      <stop offset="60%" stop-color="#F9EAE4"/>
      <stop offset="100%" stop-color="#F7E8E0"/>
    </radialGradient>
    <pattern id="tilePat" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M15 1 L29 15 L15 29 L1 15 Z" stroke="#C49A6C" stroke-width="0.5" fill="none"/>
      <circle cx="15" cy="15" r="5" stroke="#C9707A" stroke-width="0.4" fill="none"/>
    </pattern>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C49A6C" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#E8B4B8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#C49A6C" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
</svg>
