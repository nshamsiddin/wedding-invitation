<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" fill="none">
  <!-- Outer decorative ring -->
  <circle cx="160" cy="160" r="155" stroke="url(#goldRing)" stroke-width="1.5" fill="none" stroke-dasharray="4 6"/>
  <circle cx="160" cy="160" r="148" stroke="url(#goldRing2)" stroke-width="0.5" fill="none"/>

  <!-- Corner flourishes -->
  <g stroke="#c9a55a" stroke-width="1" opacity="0.7">
    <path d="M 20 160 Q 30 120 60 100 Q 50 130 40 160" fill="none"/>
    <path d="M 300 160 Q 290 120 260 100 Q 270 130 280 160" fill="none"/>
    <path d="M 20 160 Q 30 200 60 220 Q 50 190 40 160" fill="none"/>
    <path d="M 300 160 Q 290 200 260 220 Q 270 190 280 160" fill="none"/>
    <!-- Leaf accents at top -->
    <path d="M 130 18 Q 160 8 190 18" fill="none" stroke-width="1.5"/>
    <path d="M 145 14 L 160 5 L 175 14" fill="none"/>
    <!-- Leaf accents at bottom -->
    <path d="M 130 302 Q 160 312 190 302" fill="none" stroke-width="1.5"/>
    <path d="M 145 306 L 160 315 L 175 306" fill="none"/>
  </g>

  <!-- Inner circle background -->
  <circle cx="160" cy="160" r="136" fill="url(#bgGrad)"/>
  <circle cx="160" cy="160" r="136" stroke="url(#innerRing)" stroke-width="1" fill="none"/>

  <!-- Small ornamental dots on the ring -->
  <circle cx="160" cy="12" r="3" fill="#c9a55a" opacity="0.8"/>
  <circle cx="160" cy="308" r="3" fill="#c9a55a" opacity="0.8"/>
  <circle cx="12" cy="160" r="3" fill="#c9a55a" opacity="0.8"/>
  <circle cx="308" cy="160" r="3" fill="#c9a55a" opacity="0.8"/>
  <circle cx="54" cy="54" r="2" fill="#c9a55a" opacity="0.5"/>
  <circle cx="266" cy="54" r="2" fill="#c9a55a" opacity="0.5"/>
  <circle cx="54" cy="266" r="2" fill="#c9a55a" opacity="0.5"/>
  <circle cx="266" cy="266" r="2" fill="#c9a55a" opacity="0.5"/>

  <!-- Female silhouette (left) -->
  <ellipse cx="128" cy="108" rx="22" ry="24" fill="#c9a55a" opacity="0.35"/>
  <path d="M 95 230 Q 95 160 108 142 Q 118 132 128 130 Q 138 132 142 142 Q 148 155 148 165 L 148 230 Z"
        fill="#c9a55a" opacity="0.35"/>
  <!-- Female dress flare -->
  <path d="M 95 230 Q 100 270 128 275 Q 156 270 148 230 Z" fill="#c9a55a" opacity="0.25"/>

  <!-- Male silhouette (right) -->
  <ellipse cx="195" cy="108" rx="22" ry="24" fill="#a8b4bc" opacity="0.35"/>
  <path d="M 168 230 L 172 155 Q 180 135 195 132 Q 210 135 218 155 L 222 230 Z"
        fill="#a8b4bc" opacity="0.35"/>

  <!-- Joined hands -->
  <path d="M 148 185 Q 160 178 172 185" stroke="#c9a55a" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.7"/>

  <!-- Heart -->
  <path d="M 160 148 C 160 148 152 140 148 144 C 144 148 148 155 160 162 C 172 155 176 148 172 144 C 168 140 160 148 160 148 Z"
        fill="#c9a55a" opacity="0.5"/>

  <!-- Stars / sparkles -->
  <g fill="#c9a55a" opacity="0.4">
    <path d="M 80 80 L 82 76 L 84 80 L 88 82 L 84 84 L 82 88 L 80 84 L 76 82 Z" transform="scale(0.8) translate(22,22)"/>
    <path d="M 240 80 L 242 76 L 244 80 L 248 82 L 244 84 L 242 88 L 240 84 L 236 82 Z" transform="scale(0.7) translate(-50,22)"/>
    <circle cx="90" cy="230" r="2" opacity="0.5"/>
    <circle cx="230" cy="230" r="2" opacity="0.5"/>
    <circle cx="72" cy="140" r="1.5" opacity="0.4"/>
    <circle cx="248" cy="140" r="1.5" opacity="0.4"/>
  </g>

  <!-- Text placeholder -->
  <text x="160" y="252" text-anchor="middle" font-family="Cinzel, serif" font-size="11"
        fill="#c9a55a" opacity="0.7" letter-spacing="3">YOUR PHOTO</text>
  <text x="160" y="268" text-anchor="middle" font-family="Cinzel, serif" font-size="8"
        fill="#a8b4bc" opacity="0.5" letter-spacing="2">HERE</text>

  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1e1b2e"/>
      <stop offset="100%" stop-color="#0e0c1a"/>
    </radialGradient>
    <linearGradient id="goldRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a55a" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#f2d898" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#c9a55a" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="goldRing2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c9a55a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#f2d898" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="innerRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a55a" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#a8b4bc" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
</svg>
