<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="You are cordially invited" />
    <title>You Are Invited</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600&family=Lato:ital,wght@0,300;0,400;0,700;1,300;1,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- SVG grain filter definition — zero dimensions, purely declarative -->
    <svg aria-hidden="true" focusable="false"
      style="position:absolute;width:0;height:0;overflow:hidden">
      <defs>
        <filter id="grain" x="0%" y="0%" width="100%" height="100%"
          color-interpolation-filters="sRGB">
          <feTurbulence type="fractalNoise" baseFrequency="0.68" numOctaves="4"
            stitchTiles="stitch" result="noise"/>
          <feColorMatrix type="saturate" values="0" in="noise" result="grey"/>
          <feBlend in="SourceGraphic" in2="grey" mode="multiply" result="blend"/>
          <feComposite in="blend" in2="SourceGraphic" operator="in"/>
        </filter>
      </defs>
    </svg>
    <!-- Fixed grain overlay — covers entire viewport, pointer-events off -->
    <div id="grain-overlay" aria-hidden="true"
      style="position:fixed;inset:0;z-index:9999;pointer-events:none;
             opacity:0.042;filter:url(#grain);will-change:transform"></div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
