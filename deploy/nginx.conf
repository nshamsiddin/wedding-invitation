# Nginx site configuration for the wedding invitation app.
#
# SETUP INSTRUCTIONS
# ------------------
# 1. Replace every occurrence of YOUR_DOMAIN with your real domain
#    (e.g. wedding.example.com).
# 2. Copy to /etc/nginx/sites-available/invitation:
#      sudo cp nginx.conf /etc/nginx/sites-available/invitation
#      sudo sed -i 's/YOUR_DOMAIN/wedding.example.com/g' /etc/nginx/sites-available/invitation
# 3. Enable the site:
#      sudo ln -sf /etc/nginx/sites-available/invitation /etc/nginx/sites-enabled/invitation
# 4. Obtain a Let's Encrypt certificate BEFORE enabling the https block:
#      sudo certbot certonly --nginx -d YOUR_DOMAIN
# 5. Test and reload Nginx:
#      sudo nginx -t && sudo systemctl reload nginx
#
# Certbot will auto-renew the certificate via a systemd timer. Verify:
#   sudo systemctl status certbot.timer

# ── HTTPS server ─────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name YOUR_DOMAIN;

    # ── TLS ──────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/YOUR_DOMAIN/chain.pem;

    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;

    # OCSP stapling — reduces TLS handshake latency for clients
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/invitation-access.log combined;
    error_log  /var/log/nginx/invitation-error.log warn;

    # ── Proxy to Node.js ──────────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3001;

        # Forward real client IP — Express reads this via req.ip when
        # app.set('trust proxy', 1) is configured in index.ts.
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts — generous for RSVP form submissions over slow connections
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;

        # Buffer settings — responses are small JSON/HTML, no need for large buffers
        proxy_buffering    on;
        proxy_buffer_size  4k;
        proxy_buffers      8 4k;
    }

    # ── Client-side bundle caching ────────────────────────────────────────────
    # Vite outputs content-hashed filenames under /assets/ — safe to cache
    # aggressively. index.html is served by Node (no-cache so deploys are
    # picked up immediately).
    location /assets/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;

        # One year cache for hashed static assets
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    # Allow Let's Encrypt ACME challenge through before certificate is issued
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
